<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="700" viewBox="0 0 1250 700" role="img" aria-labelledby="title desc">
  <title id="title">LLM Answer And Pointer Traversal</title>
  <desc id="desc">The agent extracts entity hints from a question, chooses a context tool, reads entity or property context, follows fact, entity, source, normalized path, and section pointers, then answers with evidence or asks a clarification question.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .input { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .llm { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .tool { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 12; }
      .store { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .answer { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; }
      .decision { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 12px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .tiny { font: 11px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .edge { font: 700 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1250" height="700" />
  <text class="title" x="40" y="38">How The LLM Answers By Following Pointers</text>

  <rect class="input" x="40" y="80" width="210" height="78" />
  <text class="label" x="145" y="111">User question</text>
  <text class="small" x="145" y="132">"Why is INV-DUP-00192</text>
  <text class="small" x="145" y="149">in review?"</text>

  <rect class="llm" x="310" y="80" width="230" height="78" />
  <text class="label" x="425" y="108">Extract signals</text>
  <text class="small" x="425" y="130">entity-like IDs, names, aliases</text>
  <text class="small" x="425" y="147">intent: invoice review</text>

  <polygon class="decision" points="670,75 790,119 670,163 550,119" />
  <text class="label" x="670" y="114">Specific</text>
  <text class="small" x="670" y="134">entity found?</text>

  <rect class="tool" x="870" y="70" width="230" height="72" />
  <text class="label" x="985" y="98">read_entity_context</text>
  <text class="small" x="985" y="119">entityId = INV-DUP-00192</text>

  <rect class="tool" x="870" y="175" width="230" height="72" />
  <text class="label" x="985" y="203">read_property_context</text>
  <text class="small" x="985" y="224">broad property/context question</text>

  <rect class="store" x="870" y="285" width="230" height="86" />
  <text class="label" x="985" y="312">Entity context view</text>
  <text class="small" x="985" y="334">profile, related entities,</text>
  <text class="small" x="985" y="351">active facts, related facts</text>

  <rect class="store" x="610" y="285" width="210" height="86" />
  <text class="label" x="715" y="312">Fact pointers</text>
  <text class="small" x="715" y="334">FACT-AB6F...</text>
  <text class="small" x="715" y="351">FACT-6989...</text>

  <rect class="store" x="350" y="285" width="210" height="86" />
  <text class="label" x="455" y="312">Entity pointers</text>
  <text class="small" x="455" y="334">DL-012, LIE-001,</text>
  <text class="small" x="455" y="351">INV-DUP-00192</text>

  <rect class="store" x="90" y="285" width="210" height="86" />
  <text class="label" x="195" y="312">Source pointers</text>
  <text class="small" x="195" y="334">sourceId, rawPath,</text>
  <text class="small" x="195" y="351">normalizedPath, hashes</text>

  <rect class="store" x="90" y="455" width="210" height="86" />
  <text class="label" x="195" y="482">Evidence artifact</text>
  <text class="small" x="195" y="504">normalized invoice, bank row,</text>
  <text class="small" x="195" y="521">PDF text, email text</text>

  <rect class="store" x="350" y="455" width="210" height="86" />
  <text class="label" x="455" y="482">Context section</text>
  <text class="small" x="455" y="504">Context.md</text>
  <text class="small" x="455" y="521">risks-needs-review</text>

  <polygon class="decision" points="715,443 835,498 715,553 595,498" />
  <text class="label" x="715" y="493">Enough</text>
  <text class="small" x="715" y="513">evidence?</text>

  <rect class="answer" x="895" y="455" width="260" height="86" />
  <text class="label" x="1025" y="482">Answer</text>
  <text class="small" x="1025" y="504">state, amount, date, IDs,</text>
  <text class="small" x="1025" y="521">sources, caveats</text>

  <rect class="answer" x="595" y="595" width="240" height="64" />
  <text class="label" x="715" y="621">Ask clarification</text>
  <text class="small" x="715" y="641">if entity or target is ambiguous</text>

  <path class="arrow" d="M250 119 H310" />
  <path class="arrow" d="M540 119 H550" />
  <path class="arrow" d="M790 119 H870" />
  <text class="edge" x="805" y="109">Yes</text>
  <path class="arrow" d="M670 163 C700 205 785 211 870 211" />
  <text class="edge" x="735" y="205">No / broad</text>
  <path class="arrow" d="M985 142 V285" />
  <path class="arrow" d="M870 328 H820" />
  <path class="arrow" d="M610 328 H560" />
  <path class="arrow" d="M350 328 H300" />
  <path class="arrow" d="M195 371 V455" />
  <path class="soft" d="M715 371 V443" />
  <path class="soft" d="M455 371 V455" />
  <path class="soft" d="M300 498 H350" />
  <path class="arrow" d="M835 498 H895" />
  <text class="edge" x="848" y="488">Yes</text>
  <path class="arrow" d="M715 553 V595" />
  <text class="edge" x="727" y="579">No</text>

  <rect class="input" x="40" y="595" width="460" height="64" />
  <text class="label" x="270" y="621">Pointer chain example</text>
  <text class="small" x="270" y="642">INV-DUP-00192 -> entity view -> FACT IDs -> source IDs -> normalized evidence -> Context.md section</text>
</svg>
