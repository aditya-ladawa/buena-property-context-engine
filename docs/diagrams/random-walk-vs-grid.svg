<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Random Walk vs Structured Context Grid</title>
  <desc id="desc">The left side shows an agent randomly walking through scattered property-management events. The right side shows a structured context grid where one entity can fan out to many facts, sources, related entities, normalized artifacts, and context sections.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .agent { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .event { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .miss { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .entity { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
      .view { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
      .fact { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .source { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .answer { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .walk { stroke: #dc2626; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-red); }
      .walk-soft { stroke: #dc2626; stroke-width: 2.5; fill: none; stroke-dasharray: 7 7; opacity: 0.7; marker-end: url(#arrow-red); }
      .grid-line { stroke: #dbeafe; stroke-width: 1.5; }
      .pointer { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .pointer2 { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow-dark); }
      .pointer-soft { stroke: #64748b; stroke-width: 1.9; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow-dark); }
      .title { font: 700 25px Arial, sans-serif; fill: #0f172a; }
      .h { font: 700 20px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 12px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .tiny { font: 11px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .coord { font: 700 12px Arial, sans-serif; fill: #0f766e; text-anchor: middle; }
      .note { font: 13px Arial, sans-serif; fill: #334155; }
      .json { font: 700 11px Arial, sans-serif; fill: #14532d; text-anchor: middle; }
      .step { fill: #ffffff; stroke: #dc2626; stroke-width: 2; }
      .stepText { font: 700 12px Arial, sans-serif; fill: #991b1b; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="bg" width="1320" height="760" />
  <text class="title" x="40" y="40">Random Walk vs Structured Context Grid</text>

  <rect class="panel" x="40" y="75" width="600" height="625" />
  <text class="h" x="340" y="112">Before: agent random-walks the data space</text>

  <rect class="agent" x="275" y="145" width="130" height="56" />
  <text class="label" x="340" y="166">Agent</text>
  <text class="small" x="340" y="185">search at query time</text>

  <rect class="event" x="85" y="155" width="170" height="58" />
  <text class="label" x="170" y="178">EMAIL-06531</text>
  <text class="tiny" x="170" y="195">Offer: roof sealing</text>

  <rect class="event" x="410" y="150" width="175" height="58" />
  <text class="label" x="497" y="173">20251118 PDF</text>
  <text class="tiny" x="497" y="190">INV-DUP-00192</text>

  <rect class="event" x="95" y="295" width="165" height="58" />
  <text class="label" x="177" y="318">MASTER data</text>
  <text class="tiny" x="177" y="335">Haus 12, units</text>

  <rect class="event" x="395" y="285" width="180" height="58" />
  <text class="label" x="485" y="308">BANK TX-01551</text>
  <text class="tiny" x="485" y="325">569.42 paid?</text>

  <rect class="event" x="95" y="450" width="180" height="58" />
  <text class="label" x="185" y="473">DL-012</text>
  <text class="tiny" x="185" y="490">Elektro Schmidt</text>

  <rect class="miss" x="375" y="455" width="180" height="58" />
  <text class="label" x="465" y="478">Slack / memory</text>
  <text class="tiny" x="465" y="495">"was this approved?"</text>

  <rect class="event" x="245" y="585" width="190" height="58" />
  <text class="label" x="340" y="608">Context guess</text>
  <text class="tiny" x="340" y="625">answer may miss evidence</text>

  <path class="walk" d="M340 201 C300 230 215 215 170 213 C120 250 110 295 177 295 C255 280 390 255 485 285 C555 345 560 420 465 455 C360 520 275 465 185 508 C145 560 235 600 340 585 C455 570 510 500 465 455 C410 385 515 350 485 343 C385 355 270 390 185 450" />
  <path class="walk-soft" d="M340 201 C400 205 450 195 497 208" />

  <circle class="step" cx="340" cy="201" r="13" /><text class="stepText" x="340" y="201">0</text>
  <circle class="step" cx="170" cy="213" r="13" /><text class="stepText" x="170" y="213">1</text>
  <circle class="step" cx="177" cy="295" r="13" /><text class="stepText" x="177" y="295">2</text>
  <circle class="step" cx="485" cy="285" r="13" /><text class="stepText" x="485" y="285">3</text>
  <circle class="step" cx="465" cy="455" r="13" /><text class="stepText" x="465" y="455">4</text>
  <circle class="step" cx="185" cy="508" r="13" /><text class="stepText" x="185" y="508">5</text>
  <circle class="step" cx="340" cy="585" r="13" /><text class="stepText" x="340" y="585">6</text>
  <circle class="step" cx="497" cy="208" r="13" /><text class="stepText" x="497" y="208">?</text>

  <text class="note" x="85" y="665">The path is discovered while answering: open one thing, skim, jump, maybe miss the invoice PDF or bank row.</text>

  <rect class="panel" x="680" y="75" width="600" height="625" />
  <text class="h" x="980" y="112">After: agent traverses a branching grid</text>

  <g opacity="0.95">
    <line class="grid-line" x1="725" y1="145" x2="725" y2="640" />
    <line class="grid-line" x1="850" y1="145" x2="850" y2="640" />
    <line class="grid-line" x1="975" y1="145" x2="975" y2="640" />
    <line class="grid-line" x1="1100" y1="145" x2="1100" y2="640" />
    <line class="grid-line" x1="1225" y1="145" x2="1225" y2="640" />
    <line class="grid-line" x1="705" y1="175" x2="1245" y2="175" />
    <line class="grid-line" x1="705" y1="260" x2="1245" y2="260" />
    <line class="grid-line" x1="705" y1="345" x2="1245" y2="345" />
    <line class="grid-line" x1="705" y1="430" x2="1245" y2="430" />
    <line class="grid-line" x1="705" y1="515" x2="1245" y2="515" />
    <line class="grid-line" x1="705" y1="600" x2="1245" y2="600" />
  </g>

  <rect class="agent" x="910" y="145" width="140" height="56" />
  <text class="label" x="980" y="166">Agent</text>
  <text class="small" x="980" y="185">starts at question</text>

  <rect class="entity" x="715" y="230" width="155" height="62" />
  <text class="coord" x="792" y="252">entityId</text>
  <text class="small" x="792" y="271">INV-DUP-00192</text>
  <text class="tiny" x="792" y="286">invoice entity</text>

  <rect class="view" x="925" y="230" width="170" height="62" />
  <text class="coord" x="1010" y="252">entity view</text>
  <text class="small" x="1010" y="271">entities/INV-DUP...</text>
  <text class="tiny" x="1010" y="286">profile, facts, sources</text>

  <rect class="fact" x="705" y="345" width="150" height="62" />
  <text class="coord" x="780" y="367">review fact</text>
  <text class="small" x="780" y="386">FACT-AB6F...</text>
  <text class="tiny" x="780" y="401">needs_review</text>

  <rect class="fact" x="895" y="345" width="150" height="62" />
  <text class="coord" x="970" y="367">payment fact</text>
  <text class="small" x="970" y="386">FACT-6989...</text>
  <text class="tiny" x="970" y="401">TX-01551</text>

  <rect class="entity" x="1085" y="345" width="150" height="62" />
  <text class="coord" x="1160" y="367">related entity</text>
  <text class="small" x="1160" y="386">DL-012</text>
  <text class="tiny" x="1160" y="401">Elektro Schmidt</text>

  <rect class="source" x="705" y="465" width="150" height="62" />
  <text class="coord" x="780" y="487">source</text>
  <text class="small" x="780" y="506">INV-DUP-00192</text>
  <text class="tiny" x="780" y="521">invoice PDF</text>

  <rect class="source" x="895" y="465" width="150" height="62" />
  <text class="coord" x="970" y="487">source</text>
  <text class="small" x="970" y="506">BANK-BASE</text>
  <text class="tiny" x="970" y="521">bank CSV</text>

  <rect class="source" x="1085" y="465" width="150" height="62" />
  <text class="coord" x="1160" y="487">source</text>
  <text class="small" x="1160" y="506">MASTER-DL</text>
  <text class="tiny" x="1160" y="521">contractor master</text>

  <rect class="source" x="795" y="565" width="150" height="62" />
  <text class="coord" x="870" y="587">source</text>
  <text class="small" x="870" y="606">INDEX-BANK</text>
  <text class="tiny" x="870" y="621">bank index row</text>

  <rect class="view" x="985" y="565" width="150" height="62" />
  <text class="coord" x="1060" y="587">sectionId</text>
  <text class="small" x="1060" y="606">risks-review</text>
  <text class="tiny" x="1060" y="621">Context.md section</text>

  <rect class="answer" x="1145" y="565" width="110" height="62" />
  <text class="coord" x="1200" y="587">answer</text>
  <text class="small" x="1200" y="606">facts</text>
  <text class="tiny" x="1200" y="621">and sources</text>

  <path class="pointer" d="M980 201 C930 220 850 218 792 230" />
  <text class="json" x="884" y="218">detect $.entityId</text>

  <path class="pointer" d="M870 261 H925" />
  <text class="json" x="897" y="251">read_entity_context</text>

  <path class="pointer2" d="M1010 292 C960 320 845 320 780 345" />
  <text class="json" x="878" y="322">$.facts[?review]</text>

  <path class="pointer2" d="M1010 292 C1010 315 990 327 970 345" />
  <text class="json" x="1018" y="325">$.relatedFacts[]</text>

  <path class="pointer2" d="M1095 261 C1160 275 1180 315 1160 345" />
  <text class="json" x="1186" y="309">$.relatedEntities[]</text>

  <path class="pointer" d="M780 407 V465" />
  <text class="json" x="827" y="440">$.sourceIds[]</text>

  <path class="pointer" d="M970 407 V465" />
  <text class="json" x="1018" y="440">$.sourceIds[]</text>

  <path class="pointer" d="M1160 407 V465" />
  <text class="json" x="1210" y="440">$.sourceIds[]</text>

  <path class="pointer-soft" d="M970 527 C945 545 910 552 870 565" />
  <text class="json" x="921" y="552">$.relatedSources[]</text>

  <path class="pointer-soft" d="M780 527 C840 555 960 550 1060 565" />
  <text class="json" x="930" y="542">$.sectionId</text>

  <path class="pointer-soft" d="M1160 527 C1175 540 1190 550 1200 565" />
  <path class="pointer-soft" d="M1060 627 C1095 648 1160 650 1200 627" />
  <path class="pointer-soft" d="M870 627 C945 670 1130 670 1200 627" />

  <text class="note" x="715" y="665">One pointer can return many next nodes. The agent fans out across facts, sources, related entities, and sections, then composes the answer.</text>
</svg>
